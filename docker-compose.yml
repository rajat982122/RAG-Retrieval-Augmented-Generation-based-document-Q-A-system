version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: rag_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: rag_project
      MYSQL_USER: rag_user
      MYSQL_PASSWORD: rag_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 20

  fastapi:
    build: .
    container_name: rag_fastapi
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/project

  streamlit:
    build: .
    container_name: rag_streamlit
    restart: always
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - fastapi
    volumes:
      - .:/project

volumes:
  mysql_data:
